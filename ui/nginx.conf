server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # React Router — serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* to the FastAPI backend
    location /api/ {
        proxy_pass         http://dlms-assistant:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # Critical for SSE streaming — disable buffering
        proxy_buffering        off;
        proxy_cache            off;
        proxy_set_header       Connection '';
        chunked_transfer_encoding on;

        # Generous timeouts for long LLM streams
        proxy_read_timeout     300s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     300s;
    }

    # Static assets — aggressive caching
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check
    location /ui-health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
